name: Upstream Sync

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 时间 0 点（北京时间早上 8 点）自动运行一次
  workflow_dispatch: # 允许你随时手动点击运行

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
    # 步骤 1: 检出你的仓库代码
    - name: Checkout target repo
      uses: actions/checkout@v3
      with:
        ref: main # 注意：如果你的主分支叫 master，请改成 master
        fetch-depth: 0

    # 步骤 2: 同步上游更新
    - name: Sync upstream changes
      id: sync
      uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
      with:
        target_sync_branch: main # 你的分支名 (main 或 master)
        target_repo_token: ${{ secrets.GITHUB_TOKEN }}
        upstream_sync_branch: main # 原仓库的分支名 (main 或 master)
        upstream_sync_repo: byJoey/cfnew # 【需要修改这里】例如：torvalds/linux

    # 步骤 3: 检查是否同步成功
    - name: Check sync status
      if: steps.sync.outputs.has_new_commits == 'true'
      run: echo "同步成功！有新的更新。"
